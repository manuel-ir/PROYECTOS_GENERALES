<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Reserva</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Actualizar Reserva</h1>
            <div>
                <a href="/index.html" class="btn btn-secondary">Volver al inicio</a>
                <a href="/reserva.html" class="btn btn-secondary">Nueva reserva</a>
            </div>
        </header>

        <form method="POST" action="/reservas/actualizar">
            <div class="form-group">
                <label for="id">ID de la Reserva:</label>
                <input type="number" id="id" name="id" placeholder="Ej: 1" required>
            </div>
            
            <div class="form-group">
                <label for="fecha">Nueva Fecha:</label>
                <input type="datetime-local" id="fecha" name="fecha" required>
            </div>
            
            <div class="form-group">
                <label for="tipo">Nuevo Tipo de Evento:</label>
                <input type="text" id="tipo" name="tipo" placeholder="Ej: Concierto de Rock" required>
            </div>
            
            <div class="form-group">
                <label for="unidades">Nuevo Número de Entradas:</label>
                <input type="number" id="unidades" name="unidades" min="1" value="1" required>
            </div>
            
            <div class="form-group">
                <label for="precio">Nuevo Precio:</label>
                <input type="number" id="precio" name="precio" step="0.01" placeholder="Ej: 100.00" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Actualizar Reserva</button>
        </form>
    </div>

</body>
</html>
